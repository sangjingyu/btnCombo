<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>희망의 버튼</title>
  <link rel="stylesheet" href="css/main.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <!-- Top Bar -->
  <header class="top-bar">
    <div class="combo-wrap">
      <span class="combo-label">오늘의 희망</span>
      <span class="combo-count" id="combo-count">0</span>
      <span class="combo-unit">번</span>
    </div>
    <div class="top-right">
      <div class="level-badge" id="level-badge">LV.1</div>
      <button class="stats-btn" id="stats-btn" aria-label="통계">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="12" width="4" height="9"/><rect x="9" y="7" width="4" height="14"/>
          <rect x="15" y="3" width="4" height="18"/><line x1="1" y1="22" x2="23" y2="22"/>
        </svg>
      </button>
      <button class="stats-btn" id="settings-btn" aria-label="설정">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Canvas Animation Area -->
  <main class="canvas-area">
    <canvas id="main-canvas"></canvas>
    <div class="message-overlay" id="message-overlay"></div>
    <div class="level-announce" id="level-announce"></div>
  </main>

  <!-- Progress Bar -->
  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar"></div>
    <span class="progress-label">다음 레벨까지 <span id="progress-remain">50</span>번</span>
  </div>

  <!-- Bottom Button -->
  <footer class="button-area">
    <div class="button-ring ring-3"></div>
    <div class="button-ring ring-2"></div>
    <div class="button-ring ring-1"></div>
    <button class="hope-button" id="hope-button">
      <span class="btn-inner">
        <span class="btn-icon">💛</span>
        <span class="btn-text">희망</span>
      </span>
    </button>
  </footer>

  <!-- Settings Modal -->
  <div class="modal-backdrop" id="settings-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 class="modal-title">설정</h2>
        <button class="modal-close" id="settings-close" aria-label="닫기">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="user-info-row">
        <div class="user-avatar">👤</div>
        <div class="user-details">
          <span class="user-name" id="settings-user-name">—</span>
          <span class="user-email" id="settings-user-email">—</span>
        </div>
        <span class="demo-badge" id="settings-demo-badge" style="display:none">데모</span>
      </div>

      <div class="modal-divider"></div>

      <button class="logout-btn" id="logout-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        로그아웃
      </button>
    </div>
  </div>

  <script src="js/supabase-config.js" type="module"></script>
  <script src="js/animations.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
